<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLATH // Access Granted</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --plath-orange: #FF3300;
            --plath-black: #000000;
            --plath-dark-grey: #111111;
            --plath-border: #333333;
            --plath-text-main: #FFFFFF;
            --plath-text-dim: #999999;
            --font-stack: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; }
        body {
            background-color: var(--plath-black);
            color: var(--plath-text-main);
            font-family: var(--font-stack);
            margin: 0; padding: 0; line-height: 1.6;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAUCAYAAACNiR0NAAAAMUlEQVQ4T2M8ceIEAwo8ceIEAwo8ceIEAwo8ceIEAwo8ceIEAwo8ceIEAwo8ceIEA/4Dw533D7Z8Ew4AAAAASUVORK5CYII=');
            background-repeat: repeat;
        }

        header {
            border-bottom: 1px solid var(--plath-border);
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background-color: rgba(0, 0, 0, 0.9);
        }
        .logo { font-size: 1.4rem; letter-spacing: 3px; font-weight: bold; }
        .logo span { color: var(--plath-orange); }
        .status { font-size: 0.9rem; color: #666; }

        .container { max-width: 650px; margin: 60px auto; padding: 0 20px; text-align: center; }
        
        .success-box {
            border: 1px solid var(--plath-orange);
            background-color: var(--plath-dark-grey);
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(255, 51, 0, 0.05);
        }

        h1 { color: var(--plath-text-main); font-size: 1.8rem; text-transform: uppercase; margin-bottom: 10px; }
        p { color: var(--plath-text-dim); font-size: 0.95rem; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; color: var(--plath-orange); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        input[type="text"], input[type="date"] {
            width: 100%; padding: 12px; background-color: var(--plath-black);
            border: 1px solid var(--plath-border); color: var(--plath-text-main);
            font-family: var(--font-stack); font-size: 1rem; border-radius: 2px;
        }
        input:focus { border-color: var(--plath-orange); outline: none; }

        .submit-btn {
            width: 100%; background-color: var(--plath-orange); color: #000;
            padding: 15px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 2px; border: none; font-family: var(--font-stack);
            font-size: 1rem; cursor: pointer; margin-top: 10px;
            transition: background-color 0.3s;
        }
        .submit-btn:hover { background-color: #ffffff; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><span>PLATH</span>//ENGINE</div>
        <div class="status">// ACCESS_GRANTED</div>
    </header>

    <div class="container">
        <div class="success-box">
            <h1>Verification Initialized</h1>
            <p>Your portal access has been cleared. Input your matching telemetry coordinates below to generate your web story.</p>
            
            <form action="https://plath-production.up.railway.app/generate-report" method="POST">
                <div class="form-group">
                    <label for="fullName">Full Legal Birth Name</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="e.g., DEVON RICHARD ANTHONY">
                </div>

                <div class="form-group">
                    <label for="currentName">Current Name (Common Use)</label>
                    <input type="text" id="currentName" name="currentName" required placeholder="e.g., DEVN RATZ">
                </div>

                <div class="form-group">
                    <label for="birthDate">Date of Birth</label>
                    <input type="date" id="birthDate" name="birthDate" required>
                </div>

                <button type="submit" class="submit-btn">Run Engine Calculations</button>
            </form>
        </div>
    </div>

</body>
</html>
