<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLATH // Telemetry Entry Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --orange: #FF3300;
            --black: #000000;
            --dark: #0A0A0A;
            --grey: #121212;
            --border: #222222;
            --text: #FFFFFF;
            --dim: #666666;
            --font: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--black);
            color: var(--text);
            font-family: var(--font);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Ambient structural matrix mesh grid */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
        }

        .portal-container {
            width: 100%;
            max-width: 440px;
            background-color: var(--dark);
            border: 1px solid var(--border);
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            z-index: 2;
            transition: border-color 0.3s ease;
        }
        .portal-container:hover { border-color: var(--orange); }

        .terminal-header {
            font-size: 0.75rem;
            color: var(--dim);
            letter-spacing: 1px;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 15px;
            margin-bottom: 30px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }
        .terminal-header span.status { color: var(--orange); font-weight: 600; }

        h1 { font-size: 1.6rem; font-weight: 800; text-transform: uppercase; line-height: 1.1; margin-bottom: 10px; letter-spacing: -1px; }
        p { font-size: 0.85rem; color: #BBBBBB; margin-bottom: 25px; }

        /* Form Controls */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        label {
            display: block;
            font-size: 0.65rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background-color: var(--grey);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 14px;
            font-family: var(--font);
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--orange);
            background-color: var(--black);
        }

        input[type="date"] {
            color-scheme: dark;
        }

        .action-btn {
            width: 100%;
            background: none;
            border: 1px solid var(--orange);
            color: var(--orange);
            padding: 14px;
            font-family: var(--font);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: all 0.2s ease;
        }
        .action-btn:hover {
            background-color: var(--orange);
            color: var(--black);
        }

        /* Interactive loader panel overlay */
        .loading-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--dark);
            z-index: 10;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
        }

        .loader-log {
            font-size: 0.75rem;
            color: var(--orange);
            margin-top: 15px;
            text-align: left;
            width: 100%;
            max-width: 300px;
            white-space: pre-line;
        }

        .terminal-footer {
            margin-top: 30px;
            border-top: 1px dashed var(--border);
            padding-top: 15px;
            font-size: 0.65rem;
            color: var(--dim);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="terminal-header">
            <div>PLATH // INITIALIZATION GATE</div>
            <span class="status">ONLINE</span>
        </div>

        <div id="formView">
            <h1>Initialize Matrix Telemetry</h1>
            <p>Input your parameter anchors to compute your unified structural blueprint and establish cross-device link access.</p>

            <form action="https://plath-backend-production.up.railway.app/generate-report" method="POST" onsubmit="handleTelemetrySubmit(event, this)">
                
                <div class="input-group">
                    <label for="email">System Access Email Anchor</label>
                    <input type="email" id="email" name="email" placeholder="name@domain.com" required>
                </div>

                <div class="input-group">
                    <label for="fullName">Full Legal Birth Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="FIRST MIDDLE LAST" required autocomplete="off" style="text-transform: uppercase;">
                </div>

                <div class="input-group">
                    <label for="currentName">Current Handle / Core Alias</label>
                    <input type="text" id="currentName" name="currentName" placeholder="ALIAS" required autocomplete="off" style="text-transform: uppercase;">
                </div>

                <div class="input-group">
                    <label for="birthDate">Temporal Date Record</label>
                    <input type="date" id="birthDate" name="birthDate" required>
                </div>

                <button type="submit" class="action-btn">Run Engine Calculations</button>
            </form>
        </div>

        <div class="loading-overlay" id="loaderOverlay">
            <h1 style="color: var(--orange);">PROCESSING VECTORS</h1>
            <div class="loader-log" id="loaderLog">// Initializing handshake stream...</div>
        </div>

        <div class="terminal-footer">
            DATA OWNERSHIP GUARANTEED FLAT // SYSTEM ENCRYPTED SECURE
        </div>
    </div>

    <script>
        function handleTelemetrySubmit(e, formInstance) {
            // Force strict uppercase properties right before data stream serialization
            document.getElementById('fullName').value = document.getElementById('fullName').value.toUpperCase().trim();
            document.getElementById('currentName').value = document.getElementById('currentName').value.toUpperCase().trim();
            
            // Bring up the real-time terminal loader view instantly
            document.getElementById('formView').style.display = 'none';
            const overlay = document.getElementById('loaderOverlay');
            overlay.style.display = 'flex';
            
            const logBox = document.getElementById('loaderLog');
            
            setTimeout(() => { logBox.innerHTML += '\n// Mapping variable coordinates...'; }, 600);
            setTimeout(() => { logBox.innerHTML += '\n// Spawning core python process...'; }, 1200);
            setTimeout(() => { logBox.innerHTML += '\n// Compiling matrix layout arrays...'; }, 1800);
            
            // Allow form to naturally commit payload downstream to backend
            return true;
        }
    </script>
</body>
</html>
